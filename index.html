<!DOCTYPE html>
<html>
<head>
  <title>Axis MC Logística - Mapa</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }

    .logo {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 1000;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="logo">Axis MC Logística</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzDtggKX3qd4UwlpbJtkcvLRKT4tswGcz_uAephXHlgav2HKieZeLD4XUxbVfXg-NUP4Q/exec";

const map = L.map('map').setView([9.9281, -84.0907], 8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
}).addTo(map);

// 🔥 EXTRAER COORDENADAS INTELIGENTE
function extraerCoords(link) {
  try {
    // Google Maps
    let match = link.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (match) return [parseFloat(match[1]), parseFloat(match[2])];

    // Waze con coords
    match = link.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (match) return [parseFloat(match[1]), parseFloat(match[2])];

  } catch (e) {}

  return null;
}

// 🔥 MARCAR ENTREGADO
async function marcarEntregado(cliente) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ cliente: cliente })
  });

  alert("Entrega marcada ✅");
  location.reload();
}

// 🔥 CARGAR DATOS
async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  for (let item of data) {

    const link = item["Ubicacion digital"];
    const estado = item["Estado del envio"];
    const cliente = item["Cliente"];

    const coords = extraerCoords(link);

    // 🔴 SI NO HAY COORDS → SOLO LINK
    if (!coords) {

      const marker = L.marker([9.9281, -84.0907]).addTo(map);

      marker.bindPopup(`
        <b>${cliente}</b><br>
        <a href="${link}" target="_blank">Abrir en Waze/Maps</a><br>
        Estado: ${estado}<br><br>
        <button onclick="marcarEntregado('${cliente}')">Marcar Entregado</button>
      `);

      continue;
    }

    let color = "red";
    if (estado.toLowerCase() === "entregado") color = "green";
    if (estado.toLowerCase() === "en ruta") color = "orange";

    const marker = L.circleMarker(coords, {
      color: color,
      radius: 8
    }).addTo(map);

    marker.bindPopup(`
      <b>${cliente}</b><br>
      <a href="${link}" target="_blank">Abrir ubicación</a><br>
      Estado: ${estado}<br><br>
      <button onclick="marcarEntregado('${cliente}')">Marcar Entregado</button>
    `);
  }
}

// 🔄 REFRESH
setInterval(() => location.reload(), 30000);

loadData();

</script>

</body>
</html>
