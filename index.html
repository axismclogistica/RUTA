<!DOCTYPE html>
<html>
<head>
  <title>Axis MC Logística</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; }

    .logo {
      position: absolute;
      top: 15px;
      left: 15px;
      background: black;
      color: white;
      padding: 10px;
      border-radius: 8px;
      z-index: 9999;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="logo">Axis MC Logística</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxbgZcW9rB4o_8DXYaRCgi_TMOBlja13nb224ZSGwAba9S0ULytvsCEZ_-lGkUcLoPoEw/exec";

// COSTA RICA
const bounds = [[8.0, -86.5],[11.5, -82.5]];

const map = L.map('map', {
  maxBounds: bounds,
  maxBoundsViscosity: 1
}).fitBounds(bounds);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔥 GEOCODING (Provincia + Cantón)
async function obtenerCoords(provincia, canton) {
  try {
    const query = `${canton}, ${provincia}, Costa Rica`;
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`;

    const res = await fetch(url);
    const data = await res.json();

    if (data.length > 0) {
      return [parseFloat(data[0].lat), parseFloat(data[0].lon)];
    }
  } catch(e) {}

  return null;
}

// 🔥 MARCAR ENTREGADO
async function marcarEntregado(cliente) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ cliente })
  });

  alert("Entregado ✅");
  location.reload();
}

// 🔥 CARGAR DATOS
async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  for (let item of data) {

    const cliente = item["Cliente"];
    const provincia = item["Provincia"];
    const canton = item["Canton"];
    const link = item["Ubicacion Digital"];
    const ruta = (item["Ruta"] || "").toLowerCase();

    const entregado = (item["Entregado"] || "").toLowerCase();

    if (!ruta.includes("si")) continue;

    // 🔥 COLOR DEL PUNTO
    let color = "red";
    if (entregado.includes("entregado")) color = "green";

    const coords = await obtenerCoords(provincia, canton);
    if (!coords) continue;

    const marker = L.circleMarker(coords, {
      color: color,
      radius: 10
    }).addTo(map);

    // 🔥 BOTÓN DINÁMICO
    let botonHTML = "";

    if (entregado.includes("entregado")) {
      botonHTML = `
        <button style="
          background: green;
          color: white;
          border: none;
          padding: 8px;
          border-radius: 5px;
          cursor: not-allowed;
        " disabled>
          ✅ Entregado
        </button>
      `;
    } else {
      botonHTML = `
        <button onclick="marcarEntregado('${cliente}')" style="
          background: red;
          color: white;
          border: none;
          padding: 8px;
          border-radius: 5px;
          cursor: pointer;
        ">
          Marcar Entregado
        </button>
      `;
    }

    marker.bindPopup(`
      <b>${cliente}</b><br>
      ${canton}, ${provincia}<br><br>

      <a href="${link}" target="_blank">📍 Abrir ubicación</a><br><br>

      ${botonHTML}
    `);
  }
}

loadData();

</script>

</body>
</html>
