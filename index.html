<!DOCTYPE html>
<html>
<head>
  <title>Axis MC Logística</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }

    #map { height: 100vh; }

    .logo {
      position: absolute;
      top: 15px;
      left: 15px;
      background: black;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      z-index: 9999;
      font-weight: bold;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="logo">Axis MC Logística</div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwFLS2lidZJmux2yi1p8TznJraqE4Jvayv_ESDyVkv2mvoWFd83zxlA5m_-exBzOoEIzQ/exec";

const map = L.map('map').setView([9.9281, -84.0907], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// 🔥 EXTRAER COORDS
function extraerCoords(link) {
  try {
    let match = link.match(/q=(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (match) return [parseFloat(match[1]), parseFloat(match[2])];

    match = link.match(/ll=(-?\d+\.\d+),(-?\d+\.\d+)/);
    if (match) return [parseFloat(match[1]), parseFloat(match[2])];

  } catch (e) {}

  return null;
}

// 🔥 MARCAR ENTREGADO
async function marcarEntregado(cliente) {
  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ cliente: cliente })
  });

  alert("Entrega marcada");
  location.reload();
}

// 🔥 CARGAR
async function loadData() {
  const res = await fetch(API_URL);
  const data = await res.json();

  let offset = 0;

  for (let item of data) {

    const link = item["Ubicacion digital"];
    const cliente = item["Cliente"];
    const estado = item["Estado del envio"];

    let coords = extraerCoords(link);

    // 🔥 SI NO HAY COORDENADAS → LOS SEPARA VISUALMENTE
    if (!coords) {
      coords = [
        9.9281 + (offset * 0.01),
        -84.0907 + (offset * 0.01)
      ];
      offset++;
    }

    const marker = L.circleMarker(coords, {
      color: "red",
      radius: 8
    }).addTo(map);

    marker.bindPopup(`
      <b>${cliente}</b><br>
      Estado: ${estado}<br>
      <a href="${link}" target="_blank">Abrir ubicación</a><br><br>
      <button onclick="marcarEntregado('${cliente}')">Entregado</button>
    `);
  }
}

loadData();

</script>

</body>
</html>
